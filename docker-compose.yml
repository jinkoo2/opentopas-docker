services:
  opentopas-desktop:
    build:
      context: .
      dockerfile: Dockerfile.debian12
    container_name: opentopas-desktop
    ports:
      - "5900:5900"   # VNC (connect with any VNC client)
      - "6080:6080"   # noVNC (open http://localhost:6080/vnc.html in browser)
      - "7777:8080"   # code-server (open http://localhost:8080 in browser)
      - "8000:8000"   # topas-api (REST + WebSocket, http://localhost:8000/docs)
    environment:
      - VNC_PASS=${VNC_PASS}
      - CODE_SERVER_PASS=${CODE_SERVER_PASS}
      - VNC_RESOLUTION=1280x800x24
    shm_size: "2g"
    restart: unless-stopped
    volumes:
      - ./workspace:/root/workspace
      
